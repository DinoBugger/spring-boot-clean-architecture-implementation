plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.4'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'org.liquibase.gradle' version '2.2.2'
    id 'com.avast.gradle.docker-compose' version "0.17.12"
}
//com.avast.gradle.docker-compose allow gradle to create task like composeUp and composeDown to manage docker-compose


// Remove default logging(Logback) to avoid conflicts with log4j2
configurations.configureEach {
    exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
}

group = 'com.cleanproject'
version = '0.0.1-SNAPSHOT'
description = 'project-implementation-of-clean-architecture'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

def propOrEnv = { String key, String defaultValue ->
    project.findProperty(key)?.toString()
            ?: System.getenv(key)
            ?: defaultValue
}

def dbUrl      = propOrEnv("DB_POSTGRES_URL", "jdbc:postgresql://localhost:5432/spring_template_db?sslmode=disable")
def dbUsername = propOrEnv("DB_POSTGRES_USERNAME", "user_admin")
def dbPassword = propOrEnv("DB_POSTGRES_PASSWORD", "password_secret")

bootRun {
    environment "DB_POSTGRES_URL", dbUrl
    environment "DB_POSTGRES_USERNAME", dbUsername
    environment "DB_POSTGRES_PASSWORD", dbPassword
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-log4j2'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'com.h2database:h2'
    testRuntimeOnly 'com.h2database:h2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    //Database
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-liquibase'

    //Liquibase
    liquibaseRuntime 'org.liquibase:liquibase-core:5.0.2'
    liquibaseRuntime 'org.postgresql:postgresql'
    liquibaseRuntime 'info.picocli:picocli:4.7.7'
}

liquibase {

    activities {

        register("main") {

            changelogFile 'src/main/resources/db/changelog/db.changelog-master.yaml'
            url dbUrl
            username dbUsername
            password dbPassword
            driver 'org.postgresql.Driver'
            logLevel 'info'
        }

    }
    runList = 'main'
}
// configure for avast docker-compose plugin
dockerCompose {
    waitForTcpPorts = true
    stopContainers = true

    dev {
        projectName = 'cleanproject'
        useComposeFiles = ['docker-compose.dev.yaml']
    }
}

// Provide alternative Liquibase tasks that run the CLI via the liquibaseRuntime classpath.
// This avoids using the Gradle Liquibase plugin task implementation which may be
// incompatible with the Gradle version used by the wrapper.
tasks.register('liquibaseUpdate', JavaExec) {
    group = 'Liquibase'
    description = 'Apply pending Liquibase changesets using liquibaseRuntime classpath'
    mainClass.set('liquibase.integration.commandline.Main')
    classpath = configurations.liquibaseRuntime
    // Run from src/main/resources so relative includes inside the changelog are resolved
    workingDir = file('src/main/resources')
    args = [
        "--url=${dbUrl}",
        "--username=${dbUsername}",
        "--password=${dbPassword}",
        '--changeLogFile=db/changelog/db.changelog-master.yaml',
        'update'
    ]
}

tasks.register('liquibaseStatus', JavaExec) {
    group = 'Liquibase'
    description = 'Show pending Liquibase changesets (status)'
    mainClass.set('liquibase.integration.commandline.Main')
    classpath = configurations.liquibaseRuntime
    workingDir = file('src/main/resources')
    args = [
        "--url=${dbUrl}",
        "--username=${dbUsername}",
        "--password=${dbPassword}",
        '--changeLogFile=db/changelog/db.changelog-master.yaml',
        'status'
    ]
}

tasks.register('liquibaseUpdateSql', JavaExec) {
    group = 'Liquibase'
    description = 'Print the SQL for pending Liquibase changesets'
    mainClass.set('liquibase.integration.commandline.Main')
    classpath = configurations.liquibaseRuntime
    workingDir = file('src/main/resources')
    args = [
        "--url=${dbUrl}",
        "--username=${dbUsername}",
        "--password=${dbPassword}",
        '--changeLogFile=db/changelog/db.changelog-master.yaml',
        'updateSQL'
    ]
}

tasks.register('liquibaseValidate', JavaExec) {
    group = 'Liquibase'
    description = 'Validate the Liquibase changelog'
    mainClass.set('liquibase.integration.commandline.Main')
    classpath = configurations.liquibaseRuntime
    workingDir = file('src/main/resources')
    args = [
        "--url=${dbUrl}",
        "--username=${dbUsername}",
        "--password=${dbPassword}",
        '--changeLogFile=db/changelog/db.changelog-master.yaml',
        'validate'
    ]
}



tasks.named('test') {
    useJUnitPlatform()
}

tasks.withType(Test).configureEach {
    jvmArgs("-XX:+EnableDynamicAgentLoading")
}


tasks.register('runDev') {
    group = 'Development'

    dependsOn 'devComposeUp'
    dependsOn 'bootRun'

    tasks.named('bootRun').get().mustRunAfter('devComposeUp')
}