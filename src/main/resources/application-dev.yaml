server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/spring_template_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: user_admin
    password: password_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update